# Run prebuilt image from GitHub Container Registry (no local build)
#
# Public package (default after first publish if you set visibility public):
#   docker compose -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.ghcr.yml up -d
#
# Private package — login first:
#   echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_GITHUB_USER --password-stdin
#
# Override tag:
#   IMAGE_TAG=v1.0.2 docker compose -f docker-compose.ghcr.yml up -d

services:
  paopao-api:
    image: ghcr.io/trumpleond/paopao-api:${IMAGE_TAG:-latest}
    container_name: paopao-api
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      ADDR: ":8080"
      DB_PATH: /data/paopao.db
      API_KEY: ${API_KEY:-}
      UPSTREAM_BASE: ${UPSTREAM_BASE:-https://query.paopaodw.com}
      UPSTREAM_TIMEOUT_SEC: ${UPSTREAM_TIMEOUT_SEC:-30}
    volumes:
      - paopao-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  paopao-data:
    name: paopao-data
