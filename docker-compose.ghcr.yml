# 使用 GHCR 已构建镜像部署（无需本地 build）
#
# 镜像: ghcr.io/trumpleond/paopao-api  (Public)
# 标签: latest | 1.0.2 | 1.0 | master | sha-...
#
# 快速启动:
#   cp .env.example .env          # 可选：API_KEY / HOST_PORT
#   docker compose -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.ghcr.yml up -d
#   浏览器 http://127.0.0.1:8080/
#
# 指定版本:
#   IMAGE_TAG=1.0.2 docker compose -f docker-compose.ghcr.yml up -d
#
# 私有包时先登录:
#   echo YOUR_TOKEN | docker login ghcr.io -u trumpleond --password-stdin
#
# 详见 docs/GHCR.md

services:
  paopao-api:
    image: ghcr.io/trumpleond/paopao-api:${IMAGE_TAG:-latest}
    container_name: paopao-api
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      ADDR: ":8080"
      DB_PATH: /data/paopao.db
      API_KEY: ${API_KEY:-}
      UPSTREAM_BASE: ${UPSTREAM_BASE:-https://query.paopaodw.com}
      UPSTREAM_TIMEOUT_SEC: ${UPSTREAM_TIMEOUT_SEC:-30}
    volumes:
      - paopao-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  paopao-data:
    name: paopao-data
